<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wall Graffiti AR</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css.css') }}">
</head>

<body>

  <!-- Drawing mode -->
  <div class="toolbar" id="draw-toolbar">
    <div class="user-bar">
      {% if user and user.picture %}
      <img src="{{ user.picture }}" alt="" class="user-avatar">
      {% endif %}
      <span class="user-name">{{ user.name or user.email or 'Guest' }}</span>
      <a href="{{ url_for('logout') }}" class="toolbar-link">Logout</a>
      <a href="{{ url_for('home') }}" class="toolbar-link">Home</a>
    </div>
    <button id="pen-btn" class="active">✏️ Pen</button>
    <button id="eraser-btn">🧹 Eraser</button>
    <label>Size: <input type="range" id="size-slider" min="1" max="50" value="4"></label>
    <span id="size-label" style="color:white;">4</span>
    <input type="color" id="color-picker" value="#000000" title="Pick a color">
    <input type="text" id="hex-input" value="#000000" maxlength="7" placeholder="#000000">
    <button id="img-btn">🖼️ Insert Image</button>
    <input type="file" id="img-upload" accept="image/png,image/jpeg" style="display:none;">
    <button id="clear-btn">🗑️ Clear</button>
    <button id="save-btn">💾 Save</button>
    <button id="ar-btn">📸 Place on Wall</button>
    <!-- Preview toggle button removed from drawing toolbar -->
  </div>
  <canvas id="canvas"></canvas>
  <div id="crosshair">
    <div class="crosshair-h"></div>
    <div class="crosshair-v"></div>
  </div>

  <!-- Static Image Placement Overlay -->
  <div id="place-overlay">
    <div id="place-controls-bar">
      <label class="place-ctrl-label">
        Scale: <input type="range" id="place-scale-slider" class="place-input-range" min="10" max="400" value="100">
        <span id="place-scale-label" class="place-ctrl-val">100%</span>
      </label>
      <label class="place-ctrl-label">
        Rotate: <input type="range" id="place-rotate-slider" class="place-input-range" min="0" max="360" value="0">
        <span id="place-rotate-label" class="place-ctrl-val">0°</span>
      </label>
    </div>
    <button id="place-stamp-btn" class="place-btn">✅ Stamp</button>
    <button id="place-cancel-btn" class="place-btn">❌ Cancel</button>
  </div>

  <!-- AR overlay -->
  <div id="ar-overlay">
      <button id="ar-putdown-btn" style="position:fixed;bottom:80px;right:32px;width:56px;height:56px;border-radius:50%;background:#27ae60;color:white;font-size:28px;box-shadow:0 2px 8px rgba(0,0,0,0.12);border:none;display:flex;align-items:center;justify-content:center;z-index:201;">⬇️</button>
    <div id="ar-version"
      style="position:absolute;top:4px;right:4px;background:rgba(0,0,0,0.5);color:#0f0;padding:2px 6px;border-radius:3px;font-size:9px;font-family:monospace;z-index:100;">
      v3.0</div>
    <div id="ar-status">Point at a wall and tap to place your drawing</div>
    <div class="reticle-hint" id="reticle"></div>

    <div id="ar-top-controls">
      <div id="ar-surface-control"
        style="display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:2px;">
        <label for="ar-surface-mode"
          style="color:white;font-size:12px;text-shadow:0 0 4px black;font-weight:bold;">Surface:</label>
        <select id="ar-surface-mode"
          style="padding:4px 8px;border-radius:5px;border:none;font-size:12px;background:rgba(255,255,255,0.95);color:#222;font-weight:bold;cursor:pointer;">
          <option value="auto">Auto</option>
          <option value="wall">Wall</option>
          <option value="floor">Floor</option>
          <option value="ceiling">Ceiling</option>
        </select>
        <!-- Preview toggle button moved to bottom right -->
      </div>
      <div id="ar-action-bar">
        <input type="text" id="ar-description" placeholder="Describe your graffiti..." maxlength="500">
        <button id="ar-share-btn">Confirm All Updates</button>
        <button id="ar-load-btn">📡 Load Nearby</button>
        <button id="ar-undo-btn">↩ Undo</button>
      </div>
      <div id="ar-anchor-count"
        style="color:#0f0;font-size:10px;font-family:monospace;text-shadow:0 0 4px black;text-align:center;margin:2px 0;"></div>
      <div id="ar-gps-status"></div>
    </div>
    <button id="ar-exit-btn" class="btn-sm" style="position:fixed;bottom:24px;left:24px;color:black;padding:12px 22px;font-size:16px;border-radius:10px;background:white;box-shadow:0 2px 8px rgba(0,0,0,0.12);font-weight:bold;z-index:201;">← Back to Draw</button>
    <button id="ar-preview-toggle-btn" class="btn-sm" style="position:fixed;bottom:24px;right:24px;padding:12px 22px;font-size:16px;border-radius:10px;background:#444;color:white;box-shadow:0 2px 8px rgba(0,0,0,0.12);font-weight:bold;z-index:201;">👁️ Preview On/Off</button>
    </div>

  </div>

  <script src="{{ url_for('static', filename='javascript_thing.js', v='2.0') }}"></script>
</body>

</html>
