<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Comic Sans MS', cursive;
      background: #f5e9c8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .wip-box {
      background: #fffbe8;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);

      text-align: center;
      max-width: 340px;
    }
    .wip-title {
      font-size: 2rem;
      font-weight: bold;
      color: #d4a23a;
      margin-bottom: 18px;
    }
    .wip-desc {
      font-size: 1.1rem;
      color: #7a6a4a;
      margin-bottom: 24px;
    }
    .wip-status {
      font-size: 1.2rem;
      color: #c0392b;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="wip-box">
    <div class="wip-title">Global Art Feed</div>
    <div class="wip-desc">This page is a work in progress.<br>Check back soon for global art sharing!</div>

</html>
